<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: head('еҖүеә«дёҖиҰ§')}"></th:block>
</head>
<body>
    <th:block th:replace="~{common/fragments :: header('еҖүеә«дёҖиҰ§')}"></th:block>
    <th:block th:replace="~{common/fragments :: nav}"></th:block>
    <th:block th:replace="~{common/fragments :: message}"></th:block>

    <div th:if="${session.loginUserRole.name() == 'ADMIN'}">
        <a th:href="@{/warehouse/regist}">еҖүеә«зҷ»йҢІ</a>
    </div>

    <form class="search-form" th:action="@{/warehouse/list}" th:object="${searchForm}" method="get">
        <div>
            <span>еҖүеә«еҗҚ</span>
            <input type="text" th:field="*{warehouseName}">
            <button type="submit">жӨңзҙў</button>
            <a th:href="@{/warehouse/list}">гӮҜгғӘгӮў</a>
        </div>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>еҖүеә«еҗҚ</th>
            <th>жүҖеңЁең°</th>
            <th>зҷ»йҢІж—ҘжҷӮ</th>
        </tr>
        <tr th:each="w : ${warehouses}">
            <td th:text="${w.warehouseId}"></td>
            <td th:text="${w.warehouseName}"></td>
            <td th:text="${w.location}"></td>
            <td th:text="${w.createdAt}"></td>
        </tr>
    </table>

    <div class="pagination" th:if="${totalPages > 0}">
        <span th:text="'е…Ё ' + ${totalPages} + ' гғҡгғјгӮё'"></span>

        <div>
            <a th:if="${currentPage > 0}"
                    th:href="@{/warehouse/list(page=${currentPage - 1}, size=${size}, warehouseName=${searchForm.warehouseName})}">
                еүҚгҒё
            </a>

            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:if="${i != currentPage}"
                    th:href="@{/warehouse/list(page=${i}, size=${size}, warehouseName=${searchForm.warehouseName})}"
                    th:text="${i + 1}"></a>

                <span class="current" th:if="${i == currentPage}" th:text="${i + 1}"></span>
            </span>

            <a th:if="${currentPage + 1 < totalPages}"
                    th:href="@{/warehouse/list(page=${currentPage + 1}, size=${size}, warehouseName=${searchForm.warehouseName})}">
                ж¬ЎгҒё
            </a>
        </div>
    </div>
</body>
</html>
