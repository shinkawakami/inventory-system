<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: head('在庫一覧')}"></th:block>
</head>
<body>
    <th:block th:replace="~{common/fragments :: header('在庫一覧')}"></th:block>
    <th:block th:replace="~{common/fragments :: nav}"></th:block>
    <th:block th:replace="~{common/fragments :: message}"></th:block>

    <div>
        <a th:href="@{/stock/csv(productName=${searchForm.productName}, warehouseName=${searchForm.warehouseName})}">
            CSV出力
        </a>
    </div>

    <div th:if="${session.loginUserRole.name() == 'ADMIN'}">
        <a th:href="@{/stock/regist}">在庫登録</a>
    </div>

    <form class="search-form" th:action="@{/stock/list}" th:object="${searchForm}" method="get">
        <div>
            <span>商品名</span>
            <input type="text" th:field="*{productName}">

            <span>倉庫名</span>
            <input type="text" th:field="*{warehouseName}">

            <button type="submit">検索</button>
            <a th:href="@{/stock/list}">クリア</a>
        </div>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>商品名</th>
            <th>倉庫名</th>
            <th>在庫数</th>
            <th>登録日時</th>
            <th>操作</th>
        </tr>
        <tr th:each="s : ${stocks}">
            <td th:text="${s.stockId}"></td>
            <td th:text="${s.productName}"></td>
            <td th:text="${s.warehouseName}"></td>
            <td th:text="${s.quantity}"></td>
            <td th:text="${s.createdAt}"></td>
            <td>
                <span th:if="${session.loginUserRole.name() == 'ADMIN'}">
                    <a th:href="@{/stock/edit/{id}(id=${s.stockId})}">編集</a>
                </span>

                <a th:href="@{/stock-history/regist}">入出庫</a>

                <form th:if="${session.loginUserRole.name() == 'ADMIN'}"
                      th:action="@{/stock/delete}"
                      method="post"
                      style="display:inline;"
                      onsubmit="return confirm('削除しますか？');">
                    <input type="hidden" name="stockId" th:value="${s.stockId}">
                    <button type="submit">削除</button>
                </form>
            </td>
        </tr>
    </table>

    <div class="pagination" th:if="${totalPages > 0}">
        <span th:text="'全 ' + ${totalPages} + ' ページ'"></span>

        <div>
            <a th:if="${currentPage > 0}"
                    th:href="@{/stock/list(page=${currentPage - 1}, size=${size}, productName=${searchForm.productName}, warehouseName=${searchForm.warehouseName})}">
                前へ
            </a>

            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:if="${i != currentPage}"
                        th:href="@{/stock/list(page=${i}, size=${size}, productName=${searchForm.productName}, warehouseName=${searchForm.warehouseName})}"
                        th:text="${i + 1}"></a>

                <span class="current" th:if="${i == currentPage}" th:text="${i + 1}"></span>
            </span>

            <a th:if="${currentPage + 1 < totalPages}"
                    th:href="@{/stock/list(page=${currentPage + 1}, size=${size}, productName=${searchForm.productName}, warehouseName=${searchForm.warehouseName})}">
                次へ
            </a>
        </div>
    </div>
</body>
</html>
