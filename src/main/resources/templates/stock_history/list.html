<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: head('入出庫履歴一覧')}"></th:block>
</head>
<body>
    <th:block th:replace="~{common/fragments :: header('入出庫履歴一覧')}"></th:block>
    <th:block th:replace="~{common/fragments :: nav}"></th:block>
    <th:block th:replace="~{common/fragments :: message}"></th:block>

    <div>
        <a th:href="@{/stock-history/regist}">入出庫登録</a>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>商品名</th>
            <th>倉庫名</th>
            <th>種別</th>
            <th>数量</th>
            <th>備考</th>
            <th>日時</th>
        </tr>
        <tr th:each="h : ${histories}">
            <td th:text="${h.historyId}"></td>
            <td th:text="${h.productName}"></td>
            <td th:text="${h.warehouseName}"></td>
            <td th:text="${h.historyType}"></td>
            <td th:text="${h.quantity}"></td>
            <td th:text="${h.note}"></td>
            <td th:text="${h.createdAt}"></td>
        </tr>
    </table>
</body>
</html>
