<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>商品一覧</title>
</head>
<body>
  <h1>商品一覧</h1>

  <table border="1">
    <tr>
      <th>ID</th>
      <th>商品名</th>
      <th>価格</th>
      <th>登録日時</th>
    </tr>

    <tr th:each="p : ${products}">
      <td th:text="${p.productId}"></td>
      <td th:text="${p.productName}"></td>
      <td th:text="${p.price}"></td>
      <td th:text="${p.createdAt}"></td>
    </tr>
  </table>
</body>
</html>
